<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="./assets/css/style.css?v=1" />
  </head>
  <body>
    <div class="main work-sans">
      <div class="form-logo">
        <img src="./assets/images/Title.png" alt="logo" />
      </div>
      <form class="f-login" method="POST" action="register.php">
        <div class="inputs">
          <div class="label flex">
            <label class="md" for="name">Name</label>
            
          </div>
          <img class="inp-icon" src="./assets/images/lock-01.svg" alt="lock" />
          <input
            class="input-field sm"
            type="text"
            id="name"
            name="name"
            placeholder="Name"
            required
          />
        </div>
        <div class="inputs">
          <div class="label">
            <label class="md" for="mail">E-Mail Adresse</label>
          </div>
          <img
            class="inp-icon"
            src="./assets/images/user-circle.svg"
            alt="lock"
          />
          <input
            class="input-field sm"
            type="email"
            id="mail"
            name="email"
            placeholder="E-Mail Adresse"
            required
          />
        </div>
        <button class="login" type="submit">Register</button>
        <p class="center sm reg">
         Sie haben Account?
          <a class="forget" href="./login.html">Login</a>
        </p>
      </form>
      <div class="links">
        <a href="/">Kontakt</a>
        <img src="./assets/images/Ellipse 11610.png" alt />
        <a href="/">Impressum</a
        ><img src="./assets/images/Ellipse 11610.png" alt />
        <a href="/">Datenschutz</a>
      </div>
    </div>
  </body>
</html>
